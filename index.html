    display: flex;
    flex-direction: column;
    align-items: center;

    z-index: 10;
    transition: opacity 0.5s;
    pointer-events: none;
    text-align: center;
  }

    transform: rotate(45deg);
    animation: bounce 1s ease-in-out infinite;
    margin: 0 auto;
  }

    0%,100% { transform: rotate(45deg) translateY(0); }
    50%      { transform: rotate(45deg) translateY(8px); }
  }
